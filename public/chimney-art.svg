<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181410"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#FFD400" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFD400" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#glow)"/>

  <!-- stars -->
  <g fill="#FFD400" opacity="0.5">
    <circle cx="150" cy="110" r="3"/><circle cx="320" cy="70" r="2"/><circle cx="980" cy="90" r="3"/>
    <circle cx="1080" cy="180" r="2"/><circle cx="240" cy="200" r="2"/><circle cx="880" cy="150" r="2"/>
  </g>

  <!-- moon -->
  <circle cx="1000" cy="140" r="52" fill="none" stroke="#FFD400" stroke-width="5" opacity="0.85"/>

  <!-- smoke curls -->
  <g fill="none" stroke="#FFD400" stroke-width="9" stroke-linecap="round" opacity="0.9">
    <path d="M600 208 c -34 -30 8 -58 -26 -88 c -26 -24 6 -46 -14 -68"/>
    <path d="M652 224 c 30 -34 -10 -60 22 -92 c 24 -24 -4 -44 16 -66" opacity="0.55"/>
  </g>

  <!-- chimney -->
  <g stroke="#FFD400" stroke-width="10" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <rect x="560" y="240" width="90" height="150" rx="6"/>
    <line x1="545" y1="240" x2="665" y2="240"/>
    <!-- brick hints -->
    <line x1="560" y1="290" x2="650" y2="290" opacity="0.45"/>
    <line x1="560" y1="340" x2="650" y2="340" opacity="0.45"/>
    <line x1="605" y1="240" x2="605" y2="290" opacity="0.45"/>
    <line x1="580" y1="290" x2="580" y2="340" opacity="0.45"/>
    <line x1="630" y1="290" x2="630" y2="340" opacity="0.45"/>
  </g>

  <!-- roof -->
  <g stroke="#FFD400" stroke-width="12" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M240 520 L600 330 L960 520"/>
    <path d="M320 520 L320 620 L880 620 L880 520" stroke-width="10" opacity="0.9"/>
  </g>

  <!-- window with warm light -->
  <g>
    <rect x="560" y="520" width="80" height="100" rx="8" fill="#FFD400" opacity="0.95"/>
    <line x1="600" y1="520" x2="600" y2="620" stroke="#0c0c0c" stroke-width="6"/>
    <line x1="560" y1="570" x2="640" y2="570" stroke="#0c0c0c" stroke-width="6"/>
  </g>

  <!-- caption strip -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="360" y="668" width="480" height="52" rx="26" fill="#FFD400"/>
    <text x="600" y="702" text-anchor="middle" font-size="26" font-weight="800" fill="#111" letter-spacing="3">CHIMNEY SWEEP &amp; CLEANING</text>
  </g>
</svg>
